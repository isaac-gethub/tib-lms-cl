let _user = null;
let _email = '';
let _course = '';
let _openDomains = new Set();

(async function tibSessionGuard() {
  const { data:{ session } } = await _supa.auth.getSession();
  if (!session) return;
  const { data: enroll } = await _supa.from('enrollments')
    .select('course,is_active,expiry_date')
    .eq('user_id', session.user.id)
    .in('course', VALID_COURSES)
    .eq('is_active', true)
    .maybeSingle();
  if (!enroll) return;
  if (enroll.expiry_date && new Date(enroll.expiry_date) < new Date()) return;
  _user = session.user;
  _email = session.user.email;
  _course = enroll.course;
  showApp();
})();

function switchTab(tab) {
  document.querySelectorAll('.login-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='signin'?0:1)));
  document.getElementById('tab-signin').classList.toggle('active', tab==='signin');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
}

async function doSignIn() {
  const email = document.getElementById('si-email').value.trim();
  const pass = document.getElementById('si-pass').value;
  const msg = document.getElementById('si-msg');
  msg.className='login-msg';
  if (!email||!pass){msg.className='login-msg error';msg.textContent='Please enter email and password.';return;}
  const {data,error} = await _supa.auth.signInWithPassword({email,password:pass});
  if(error){msg.className='login-msg error';msg.textContent=error.message;return;}
  const {data:enroll} = await _supa.from('enrollments')
    .select('course,is_active,expiry_date')
    .eq('user_id',data.user.id)
    .in('course',VALID_COURSES)
    .eq('is_active',true)
    .maybeSingle();
  if(!enroll){
    await _supa.auth.signOut();
    msg.className='login-msg error';
    msg.textContent='No active CL enrolment found. Please contact admin@tib-systems.com';
    return;
  }
  if(enroll.expiry_date && new Date(enroll.expiry_date)<new Date()){
    await _supa.auth.signOut();
    msg.className='login-msg error';msg.textContent='Your access has expired.';return;
  }
  _user=data.user; _email=email; _course=enroll.course;
  showApp();
}

async function doRegister() {
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const msg=document.getElementById('reg-msg');
  msg.className='login-msg';
  if(!name||!email||!pass){msg.className='login-msg error';msg.textContent='All fields required.';return;}
  if(pass.length<8){msg.className='login-msg error';msg.textContent='Password must be at least 8 characters.';return;}
  const {error}=await _supa.auth.signUp({email,password:pass,options:{data:{full_name:name},emailRedirectTo:LMS_URL}});
  if(error){msg.className='login-msg error';msg.textContent=error.message;return;}
  msg.className='login-msg success';
  msg.textContent='Account created! Check your email to confirm, then sign in. Access will be activated once your enrollment is confirmed.';
}

async function doSignOut(){await _supa.auth.signOut();location.reload();}

function showApp(){
  document.getElementById('login-screen').style.display='none';
  const app=document.getElementById('main-app');
  app.style.display='flex';
  document.getElementById('topbar-user').textContent=_email;
  document.getElementById('watermark-bar').textContent=`TIB SYSTEMS — LICENSED TO: ${_email.toUpperCase()} — UNAUTHORISED DISTRIBUTION PROHIBITED`;
  if(_course==='cl_upgrade'){
    document.getElementById('upgrade-banner').style.display='block';
    document.getElementById('topbar-title').textContent='TIB CL Programme (SCC Upgrade)';
    document.getElementById('sidebar').querySelector('.sidebar-header').textContent='CL Domains — Upgrade View';
  } else if(_course==='alumni'){
    document.getElementById('topbar-title').textContent='TIB CL Programme (Alumni)';
  }
  buildSidebar();
  showWelcome();
}

function buildSidebar(){
  const dl=document.getElementById('domain-list');
  dl.innerHTML='';
  DOMAINS.forEach(dom=>{
    const isUpgrade=(_course==='cl_upgrade');
    const isSCC=SCC_DOMAINS.has(dom.code);
    const di=document.createElement('div');
    di.className='domain-item';
    di.id=`dom-${dom.code}`;
    let badgeHtml='';
    if(isUpgrade){
      badgeHtml = isSCC
        ? ' <span class="badge-scc">SCC &#10003;</span>'
        : ' <span class="badge-new">NEW</span>';
    }
    di.innerHTML=`<div class="domain-code">Domain ${dom.code}${badgeHtml}</div><div class="domain-name">${dom.name}</div><div class="domain-count">${dom.procs} procedures</div>`;
    di.onclick=()=>toggleDomain(dom.code);
    dl.appendChild(di);
    const pl=document.createElement('div');
    pl.className='proc-list';
    pl.id=`procs-${dom.code}`;
    getProcList(dom.code).forEach(proc=>{
      const pi=document.createElement('div');
      pi.className='proc-item';
      pi.id=`proc-${proc.code}`;
      const display=proc.code.slice(0,1)+'-'+proc.code.slice(1);
      const pname=proc.title? ` — ${proc.title}`:'';
      pi.textContent=display+pname;
      pi.onclick=()=>loadProcedure(dom.code,proc.code);
      pl.appendChild(pi);
    });
    dl.appendChild(pl);
  });
  const rl=document.getElementById('resource-links');
  RESOURCES.forEach((r,i)=>{
    const ri=document.createElement('div');
    ri.className='resource-item';
    ri.textContent=r.label;
    ri.onclick=()=>showResourceDetail(i);
    rl.appendChild(ri);
  });
}

function toggleDomain(code){
  const domEl=document.getElementById(`dom-${code}`);
  const procEl=document.getElementById(`procs-${code}`);
  const isOpen=_openDomains.has(code);
  _openDomains.forEach(c=>{
    document.getElementById(`dom-${c}`)?.classList.remove('active');
    document.getElementById(`procs-${c}`)?.classList.remove('open');
  });
  _openDomains.clear();
  if(!isOpen){_openDomains.add(code);domEl.classList.add('active');procEl.classList.add('open');}
  closeSidebar();
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar(){
  if(window.innerWidth<=768){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }
}

          const isUpgrade2=(_course==='cl_upgrade');
          const isSCC=SCC_DOMAINS.has(d.code);
          const cardClass=isUpgrade2?(isSCC?'domain-card scc-done':'domain-card cl-new'):'domain-card';
          const codeClass=isUpgrade2&&!isSCC?'dc-code new-domain':'dc-code';
          let badge='';
          if(isUpgrade2) badge=isSCC?' <span class="badge-scc">SCC &#10003;</span>':' <span class="badge-new">NEW</span>';
          return `<div class="${cardClass}" onclick="toggleDomain('${d.code}')">
            <div class="${codeClass}">Domain ${d.code}${badge}</div>
            <div class="dc-name">${d.name}</div>
            <div class="dc-count">${d.procs} procedures</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

async function loadProcedure(domainCode,procCode){
  document.querySelectorAll('.proc-item').forEach(el=>el.classList.remove('active'));
  const procEl=document.getElementById(`proc-${procCode}`);
  if(procEl) procEl.classList.add('active');
  closeSidebar();
  const ci=document.getElementById('content-inner');
  ci.innerHTML=`
    <div class="proc-header">
      <h2>${procCode.slice(0,1)+'-'+procCode.slice(1)} &mdash; ${PROC_NAMES[procCode]||procCode}</h2>
      <div class="proc-meta">Domain ${domainCode} — ${DOMAINS.find(d=>d.code===domainCode)?.name||''}</div>
    </div>
    <div class="proc-content-box">
      <div class="loading-spinner"><div class="spinner"></div><div>Loading procedure document...</div></div>
    </div>`;
  const fileName=buildFilename(procCode);
  if(!fileName){ci.querySelector('.proc-content-box').innerHTML=`<div class="error-box"><strong>Filename not found for ${procCode}.</strong></div>`;return;}
  const url=`${B2_BASE}/${fileName}`;
  try{
    const resp=await fetch(url);
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const buf=await resp.arrayBuffer();
    const result=await mammoth.convertToHtml({arrayBuffer:buf});
    const box=ci.querySelector('.proc-content-box');
    box.innerHTML=`<div class="proc-doc-render">${result.value}</div>`;
    const wm=document.createElement('div');
    wm.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-size:14px;color:rgba(31,56,100,0.05);font-weight:900;pointer-events:none;white-space:nowrap;z-index:0';
    wm.textContent=`TIB SYSTEMS — ${_email}`;
    box.querySelector('.proc-doc-render').appendChild(wm);
  }catch(e){
    ci.querySelector('.proc-content-box').innerHTML=`<div class="error-box"><strong>Unable to load procedure.</strong><br>File: ${fileName}<br>Ensure it is uploaded to Backblaze B2 (scc-cl-docs/${fileName}).<br>Error: ${e.message}</div>`;
  }
}

function showResources(){
  const ci=document.getElementById('content-inner');
  ci.innerHTML=`
    <div class="resource-card">
      <h2>&#128194; Resource Library</h2>
      <p>Your course materials are licensed exclusively to your account.</p>
      ${RESOURCES.map((r,i)=>`
        <div style="border:1px solid #e0e6ef;border-radius:6px;padding:16px;margin-bottom:14px">
          <div style="font-size:15px;font-weight:700;color:#1F3864;margin-bottom:6px">${r.label}</div>
          <div style="font-size:13px;color:#555;margin-bottom:12px">${r.desc}</div>
          <button class="resource-download-btn" onclick="showResourceDetail(${i})">View Document</button>
        </div>`).join('')}
    </div>`;
  closeSidebar();
}

function showResourceDetail(idx){
  const r=RESOURCES[idx];
  const ci=document.getElementById('content-inner');
  ci.innerHTML=`<div class="resource-card"><h2>${r.label}</h2><p>${r.desc}</p><div class="loading-spinner"><div class="spinner"></div><div>Loading...</div></div></div>`;
  fetch(`${B2_BASE}/${r.file}`)
    .then(resp=>{if(!resp.ok) throw new Error(`HTTP ${resp.status}`);return resp.arrayBuffer();})
    .then(buf=>mammoth.convertToHtml({arrayBuffer:buf}))
    .then(result=>{ci.querySelector('.resource-card').innerHTML=`<h2>${r.label}</h2><p style="font-size:12px;color:#C65911;margin-bottom:16px;font-weight:700">LICENSED TO: ${_email.toUpperCase()}</p><div class="proc-doc-render">${result.value}</div>`;})
    .catch(e=>{ci.querySelector('.resource-card').innerHTML=`<h2>${r.label}</h2><div class="error-box">Document not yet available.<br>Error: ${e.message}</div>`;});
  closeSidebar();
}

document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{
  if(e.key==='F12'||(e.ctrlKey&&['u','U','s','S','c','C','p','P'].includes(e.key))) e.preventDefault();
});
</script>
